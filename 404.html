<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Single Page App</title>
    <script type="text/javascript">
      // Segment the URL to get the base path
      var l = window.location;
      var base = l.pathname.split('/')[1];
      l.replace(l.pathname, '/' + base + '/');
    </script>
  </head>
  <body>
    <script type="text/javascript">
      // Redirect to the base path
      window.location.replace('/' + base + '/');
    </script>
  </body>
</html>
