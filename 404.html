<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Simple redirect based on URL path
      (function() {
        var path = window.location.pathname;
        
        // Remove leading slash if present
        path = path.replace(/^\//, '');
        
        // Route mapping
        var routes = {
          '': '/',
          'contact': '/contact',
          'mini-ui-kit': '/mini-ui-kit',
          'about': '/about',
          '2025': '/2025'
        };
        
        // Find matching route
        for (var route in routes) {
          if (path.startsWith(route)) {
            window.location.replace('/' + routes[route]);
            return;
          }
        }
        
        // Default to home
        window.location.replace('/');
      })();
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
